<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">


    <title>Footage</title>
</head>

<body class="footage">
    <header>
        <a href="javascript:history.back()" class="thought-back">
            <i class="bi bi-arrow-left-circle backmain"></i>
        </a>
        <h2 class="title">The Footage Board</h2>
    </header>

    <section id="Footage" class="Footage Container">
        <div class="AvatarCollection">
            <div class="AvatarCard">
                <img src="img/profile_icon/0.png" alt="laughing profile">
                <p class="name">Evelyn</p>
                <span class="AvatarThought">No Thought</span>
            </div>
        </div>
        <form class="Submission">
            <input type="text" placeholder="Nickname" name="name" id="name" maxlength="30">
            <input type="text" name="msg" id="msg" placeholder="Any thought?" maxlength="50">
            <button type="submit">
                <i class="bi bi-arrow-up-circle upload"></i>
            </button>
        </form>
    </section>
    <script src="footage.js"></script>

</body>

</html>
